<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Le Chaaya · Attendance</title>
<style>
  :root {
    --cream: #FAF5EA;       /* Pale Cream — Side B palette */
    --gold: #C9A24B;        /* Soft Gold */
    --gold-deep: #A8842F;
    --tea: #3E2C1C;         /* steeped-tea brown for text */
    --leaf: #4E6B4A;        /* IN state */
    --ember: #A65440;       /* OUT state */
    --card: #FFFFFF;
    --line: #E8DFCC;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--cream);
    color: var(--tea);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .brand { text-align: center; margin-bottom: 20px; }
  .brand h1 { font-size: 1.5rem; letter-spacing: 0.12em; font-weight: 600; }
  .brand p  { font-size: 0.8rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold-deep); margin-top: 4px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    width: 100%; max-width: 380px;
    padding: 22px 20px;
    box-shadow: 0 2px 10px rgba(62,44,28,0.06);
  }
  label { display: block; font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-deep); margin: 14px 0 6px; }
  input {
    width: 100%; padding: 12px 14px;
    font-size: 1.05rem; font-family: inherit;
    border: 1px solid var(--line); border-radius: 9px;
    background: var(--cream); color: var(--tea);
  }
  input:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  #empId { text-transform: uppercase; letter-spacing: 0.08em; }

  .status {
    margin-top: 16px; padding: 12px 14px;
    border-radius: 9px; font-size: 0.95rem;
    background: var(--cream); border: 1px dashed var(--line);
    min-height: 44px; display: flex; align-items: center;
  }
  .status.in  { border-color: var(--leaf); color: var(--leaf); }
  .status.out { border-color: var(--ember); color: var(--ember); }

  button {
    width: 100%; margin-top: 18px; padding: 16px;
    font-family: inherit; font-size: 1.15rem; letter-spacing: 0.06em;
    border: none; border-radius: 10px; cursor: pointer;
    background: var(--gold); color: #fff;
    transition: transform 0.06s ease;
  }
  button:active { transform: scale(0.98); }
  button:disabled { background: var(--line); color: #9b8f7a; cursor: wait; }
  button.in-mode  { background: var(--leaf); }
  button.out-mode { background: var(--ember); }

  .result {
    margin-top: 16px; padding: 14px;
    border-radius: 9px; font-size: 0.98rem; line-height: 1.5;
    display: none;
  }
  .result.ok    { display: block; background: #EFF4EC; border: 1px solid var(--leaf); }
  .result.error { display: block; background: #F7ECE8; border: 1px solid var(--ember); }

  .gps { margin-top: 14px; font-size: 0.8rem; color: #8b7d66; text-align: center; }

  /* success flash */
.flash {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(250,245,234,0.96);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
  text-align: center; padding: 24px;
}
.flash.show { opacity: 1; pointer-events: auto; }
.flash .ring {
  width: 92px; height: 92px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
}
.flash.in .ring  { background: var(--leaf); }
.flash.out .ring { background: var(--ember); }
.flash svg { width: 48px; height: 48px; }
.flash svg path {
  stroke: #fff; stroke-width: 3.5; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: 60; stroke-dashoffset: 60;
}
.flash.show svg path { animation: draw 0.45s ease-out 0.15s forwards; }
@keyframes draw { to { stroke-dashoffset: 0; } }
.flash h2 { font-size: 1.35rem; letter-spacing: 0.04em; margin-bottom: 6px; }
.flash p  { color: var(--gold-deep); font-size: 1rem; }
@media (prefers-reduced-motion: reduce) {
  .flash { transition: none; }
  .flash svg path { stroke-dashoffset: 0; animation: none; }
}
  
</style>
</head>
<body>
  <div class="brand">
    <h1>LE CHAAYA</h1>
    <p>Staff attendance</p>
  </div>

  <div class="card">
    <label for="empId">Employee ID</label>
    <input id="empId" inputmode="text" autocomplete="off" placeholder="e.g. E001">

    <label for="pin">PIN</label>
    <input id="pin" type="password" inputmode="numeric" maxlength="6" autocomplete="off" placeholder="••••">

    <div class="status" id="status">Enter your employee ID to begin.</div>

    <button id="punch" disabled>Log in</button>

    <div class="result" id="result"></div>
    <div class="gps" id="gps">Location: waiting…</div>
  </div>

  <div class="flash" id="flash" role="status">
  <div class="ring"><svg viewBox="0 0 52 52"><path d="M14 27 L22 35 L38 18"/></svg></div>
  <h2 id="flashTitle"></h2>
  <p id="flashSub"></p>
</div>

<script>
  // ── CONFIG: paste your Apps Script web app URL here ──
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzvKBSQ0t1NO017H7t34Sx2lYKX_C09N038sbXdFEaABmLEdsaSsRU-6qtwTUo2QCXg/exec';

  let geo = { lat: null, lng: null, accuracy: null };
  let statusReady = false;

  const $ = id => document.getElementById(id);
  const empInput = $('empId'), pinInput = $('pin'), btn = $('punch'),
        statusBox = $('status'), resultBox = $('result'), gpsBox = $('gps');

  // ── Device ID: generated once per browser, persists across visits ──
  function getDeviceId() {
    try {
      let id = localStorage.getItem('lc_device_id');
      if (!id) {
        id = 'DV-' + ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
          (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
        ).slice(0, 23);
        localStorage.setItem('lc_device_id', id);
      }
      return id;
    } catch (e) { return ''; } // private/incognito mode may block storage
  }
  const deviceId = getDeviceId();

  // ── API helper (text/plain avoids CORS preflight, which Apps Script can't answer) ──
  async function api(payload) {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
      redirect: 'follow'
    });
    return res.json();
  }

  // ── Capture location (watch keeps it fresh & improves accuracy) ──
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      pos => {
        geo = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy };
        gpsBox.textContent = 'Location: captured (±' + Math.round(geo.accuracy) + ' m)';
      },
      () => { gpsBox.textContent = 'Location: unavailable — punch will be recorded without GPS'; },
      { enableHighAccuracy: true, maximumAge: 15000, timeout: 12000 }
    );
  } else {
    gpsBox.textContent = 'Location: not supported on this device';
  }

  // ── Status check: shows what the next punch will do ──
  async function checkStatus() {
    const empId = empInput.value.trim().toUpperCase();
    statusReady = false;
    if (!empId) { btn.disabled = true; statusBox.className = 'status'; statusBox.textContent = 'Enter your employee ID to begin.'; return; }

    statusBox.className = 'status';
    statusBox.textContent = 'Checking…';
    btn.disabled = true;
    try {
      const s = await api({ action: 'status', empId: empId });
      if (!s.ok) { statusBox.textContent = s.error; return; }
      if (s.nextAction === 'OUT') {
        statusBox.className = 'status out';
        statusBox.textContent = 'Hi ' + s.name + ' — logged in since ' + s.since + '. Next tap logs you OUT.';
        btn.textContent = 'Log out'; btn.className = 'out-mode';
      } else {
        statusBox.className = 'status in';
        statusBox.textContent = 'Hi ' + s.name + ' — you are not logged in. Next tap logs you IN.';
        btn.textContent = 'Log in'; btn.className = 'in-mode';
      }
      statusReady = true;
      btn.disabled = false;
    } catch (e) {
      statusBox.textContent = 'Could not reach the server. Check your connection and try again.';
    }
  }

  empInput.addEventListener('input', () => { resultBox.className = 'result'; });

  empInput.addEventListener('change', checkStatus);
  empInput.addEventListener('blur', checkStatus);

  // ── Punch ──
  btn.addEventListener('click', async () => {
    resultBox.className = 'result';
    const empId = empInput.value.trim().toUpperCase();
    if (!statusReady) return;
    if (!pinInput.value) { showResult('error', 'Enter your PIN first.'); return; }
    if (geo.lat == null) {
      navigator.geolocation.getCurrentPosition(() => {}, () => {});
      showResult('error', 'Location is required to punch in. Allow location access for this site and try again.');
      return;
    }
    btn.disabled = true; btn.textContent = 'Recording…';

    try {
      const r = await api({
        action: 'punch', empId: empId, pin: pinInput.value,
        lat: geo.lat, lng: geo.lng, accuracy: geo.accuracy, deviceId: deviceId
      });
      if (!r.ok) {
        showResult('error', r.error);
      } else {
        showSuccess(r);
if (r.atOutlet === 'NO') showResult('ok', 'Note: recorded away from the outlet.');
        pinInput.value = '';
        try { localStorage.setItem('lc_last_emp', empId); } catch (e) {}
      }
    } catch (e) {
      showResult('error', 'Could not reach the server. Your punch was NOT recorded — try again.');
    }
    checkStatus(); // refresh state either way
  });

  function showSuccess(r) {
  const flash = $('flash');
  $('flashTitle').textContent =
    (r.action === 'IN' ? 'Logged in' : 'Logged out') + ' · ' + r.time;
  $('flashSub').textContent = r.action === 'IN'
    ? 'Have a good shift, ' + r.name + '.'
    : 'Shift: ' + r.shiftHours + ' hrs. See you, ' + r.name + '.';
  flash.className = 'flash show ' + (r.action === 'IN' ? 'in' : 'out');
  setTimeout(() => { flash.className = 'flash'; }, 2400);
}

  function showResult(kind, msg) {
    resultBox.className = 'result ' + kind;
    resultBox.textContent = msg;
  }

  // ── On load: prefill last-used employee ID on this phone ──
  try {
    const lastEmp = localStorage.getItem('lc_last_emp');
    if (lastEmp) { empInput.value = lastEmp; checkStatus(); }
  } catch (e) {}
</script>
</body>
</html>
